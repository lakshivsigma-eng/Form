<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blink Support</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body {
      background-color: #0b0f19;
    }
    /* Formspree dynamic AJAX status states */
    [data-fs-success], [data-fs-error] {
      display: none;
    }
    .fs-submitted [data-fs-success] {
      display: flex;
    }
    .fs-has-errors [data-fs-error] {
      display: flex;
    }
  </style>
</head>
<body class="text-slate-200 font-sans min-h-screen flex items-center justify-center p-4 sm:p-6">

  <div class="w-full max-w-lg bg-[#111827] border border-slate-800 rounded-2xl shadow-2xl overflow-hidden flex flex-col">
    
    <div class="bg-[#1f2937] border-b border-slate-800 p-4 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="relative flex h-3 w-3">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
        </div>
        <div>
          <h1 class="text-lg font-semibold text-white tracking-wide">Blink Support</h1>
          <p class="text-xs text-slate-400">Our team typically responds in minutes</p>
        </div>
      </div>
    </div>

    <div class="p-4 bg-[#111827] pb-0">
      <div data-fs-success class="flex items-start space-x-3 p-4 bg-[#062419] border border-emerald-500/30 rounded-xl text-emerald-400 text-sm">
        <svg class="h-5 w-5 shrink-0 mt-0.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <div>
          <strong class="block text-white font-medium mb-0.5">Ticket Submitted!</strong>
          Thank you. Your request was successfully filed under Blink Support. We'll follow up shortly via email.
        </div>
      </div>

      <div data-fs-error class="flex items-start space-x-3 p-4 bg-[#2a0f14] border border-rose-500/30 rounded-xl text-rose-400 text-sm">
        <svg class="h-5 w-5 shrink-0 mt-0.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <div>
          <strong class="block text-white font-medium mb-0.5">Unable to Submit</strong>
          Please look over the form fields and correct any highlighted validation errors.
        </div>
      </div>
    </div>

    <form id="support-form" class="p-6 space-y-4 flex-1">
      
      <div>
        <label for="name" class="block text-xs font-medium uppercase tracking-wider text-slate-400 mb-1.5">Full Name</label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          data-fs-field 
          required
          placeholder="John Doe"
          class="w-full bg-[#1f2937] border border-slate-700 rounded-lg px-3.5 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
        />
        <span data-fs-error="name" class="block text-xs text-rose-400 mt-1"></span>
      </div>

      <div>
        <label for="email" class="block text-xs font-medium uppercase tracking-wider text-slate-400 mb-1.5">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          data-fs-field 
          required
          placeholder="you@example.com"
          class="w-full bg-[#1f2937] border border-slate-700 rounded-lg px-3.5 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
        />
        <span data-fs-error="email" class="block text-xs text-rose-400 mt-1"></span>
      </div>

      <div>
        <label for="message" class="block text-xs font-medium uppercase tracking-wider text-slate-400 mb-1.5">Message</label>
        <textarea 
          id="message" 
          name="message" 
          data-fs-field 
          required
          rows="5"
          placeholder="Type your message here..."
          class="w-full bg-[#1f2937] border border-slate-700 rounded-lg px-3.5 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition resize-none"
        ></textarea>
        <span data-fs-error="message" class="block text-xs text-rose-400 mt-1"></span>
      </div>

      <div class="pt-2">
        <button 
          type="submit" 
          data-fs-submit-btn
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-sm py-2.5 px-4 rounded-lg shadow transition duration-150 ease-in-out active:scale-[0.98] disabled:opacity-50 disabled:pointer-events-none flex items-center justify-center space-x-2"
        >
          <span>Send Message</span>
          <svg class="h-4 w-4 transform rotate-45 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
          </svg>
        </button>
      </div>

    </form>
  </div>

  <script>
    window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
    formspree('initForm', { formElement: '#support-form', formId: 'xykvywre' });
  </script>
  <script src="https://unpkg.com/@formspree/ajax@1" defer></script>

</body>
</html>
